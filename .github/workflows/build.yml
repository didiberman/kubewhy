name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  compile:
    name: build (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build -o bin/kubewhy${{ matrix.os == 'windows-latest' && '.exe' || '' }} ./cmd/kubewhy

      - name: smoke test (--help)
        run: ./bin/kubewhy${{ matrix.os == 'windows-latest' && '.exe' || '' }} --help
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: kubewhy-${{ matrix.os }}
          path: bin/kubewhy${{ matrix.os == 'windows-latest' && '.exe' || '' }}
